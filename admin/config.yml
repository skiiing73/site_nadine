backend:
  name: git-gateway
  branch: main

media_folder: "img/blog"
public_folder: "/img/blog"

locale: 'fr'

collections:
  - name: "blog"
    label: "Articles de blog"
    folder: "blog"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Image de couverture", name: "cover_image", widget: "image", required: false, hint: "Image affichée en haut de l'article (optionnel)" }
      - { label: "Description courte", name: "excerpt", widget: "text", hint: "Résumé affiché sur la liste des articles (2-3 phrases max)" }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Publié", name: "published", widget: "boolean", default: true, hint: "Décocher pour garder l'article en brouillon" }
